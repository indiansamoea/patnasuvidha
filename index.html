        function timeAgo(timestamp) {
            if (!timestamp) return '';
            const seconds = Math.floor((new Date() - timestamp) / 1000);
            if (isNaN(seconds)) return '';
            let interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + (window.appState.lang === 'en' ? " days ago" : " दिन पहले");
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + (window.appState.lang === 'en' ? " hours ago" : " घंटे पहले");
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + (window.appState.lang === 'en' ? " mins ago" : " मिनट पहले");
            return window.appState.lang === 'en' ? "Just now" : "अभी अभी";
        }

        function setupDatabaseListener() {
            if (!window.appState.user) return;
            if (unsubscribeDb) unsubscribeDb();
            if (unsubscribeConfig) unsubscribeConfig();

            const failsafeTimer = setTimeout(() => {
                if (window.appState.isLoading) { window.appState.isLoading = false; render(); }
            }, 3000);

            // Fetch global config
            const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'main');
            unsubscribeConfig = onSnapshot(configRef, (docSnap) => {
                if(docSnap.exists()) {
                    window.appState.globalConfig = { ...window.appState.globalConfig, ...docSnap.data() };
                }
                renderNotice();
                if(window.appState.currentRoute === 'admin') render(); 
            });

            // Fetch Businesses
            const businessesRef = collection(db, 'artifacts', appId, 'public', 'data', 'businesses');
            unsubscribeDb = onSnapshot(businessesRef, (snapshot) => {
                clearTimeout(failsafeTimer); 
                const fetched = [];
                snapshot.forEach((doc) => { fetched.push({ id: doc.id, ...doc.data() }); });
                window.appState.businesses = fetched;
                window.appState.isLoading = false;
                
                if (['home', 'admin', 'business-details'].includes(window.appState.currentRoute)) render();
                showPromoPopup(); 
            }, (error) => {
                clearTimeout(failsafeTimer); window.appState.isLoading = false; render();
            });
        }

        window.handleImageUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    window.appState.uploadedImage = canvas.toDataURL('image/jpeg', 0.6); 
                    const previewEl = document.getElementById('image-preview');
                    if(previewEl) previewEl.innerHTML = `<img src="${window.appState.uploadedImage}" class="w-full h-32 object-cover rounded-xl border border-amber-500/50 shadow-lg fade-in">`;
                }
            };
        };

                                                    <span class="text-xs text-slate-400 font-bold ml-1 uppercase">Rank: <span class="text-white text-sm">${b.rank || 0}</span></span>
                                                    <div class="flex gap-1 ml-2">
                                                        <button onclick="updateRank('${b.id}', ${b.rank}, -1)" class="w-7 h-7 bg-slate-800 hover:bg-slate-700 rounded text-slate-300 flex items-center justify-center"><i class="ph-bold ph-minus"></i></button>
                                                        <button onclick="updateRank('${b.id}', ${b.rank}, 1)" class="w-7 h-7 bg-amber-500/20 hover:bg-amber-500/40 border border-amber-500/30 rounded text-amber-400 flex items-center justify-center"><i class="ph-bold ph-plus"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                    ${state.businesses.length === 0 ? `<div class="text-center py-16"><i class="ph-fill ph-folder-open text-5xl text-slate-600 mb-3"></i><p class="text-slate-400">Database is empty.</p></div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (state.currentRoute === 'success') {
                html = `
                    <div class="w-full max-w-xl mx-auto px-4 py-24 text-center fade-in flex-grow flex items-center justify-center">
                        <div class="glass-panel border-green-500/30 p-10 rounded-3xl shadow-[0_0_40px_rgba(34,197,94,0.1)] relative w-full">
                            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-green-500/40">
                                <i class="ph-bold ph-check text-4xl text-green-400"></i>
                            </div>
                            <h2 class="text-3xl font-bihari font-extrabold text-white mb-3">Congratulations! Successfully Published!</h2>
                            <p class="text-slate-300 mb-8">${getTranslation('successMsg')}</p>
                            
                            <div class="flex justify-center items-center text-amber-500/80 text-sm">
                                <i class="ph-bold ph-spinner-gap animate-spin text-lg mr-2"></i> Redirecting to directory...
                            </div>
                        </div>
                    </div>
                `;
            }

            root.innerHTML = html;
            updateStaticTranslations();

            if (state.currentRoute === 'home') renderListings();
            if (state.currentRoute === 'add-business' || state.currentRoute === 'admin-add' || state.currentRoute === 'admin-edit') {
                 const catDropdown = document.getElementById('category');
                 if(catDropdown && catDropdown.value) updateDynamicForm(catDropdown.value);
            }
        };

        function renderListings() {
            const container = document.getElementById('listings-container');
            if (!container) return;

            const state = window.appState;
            const allCats = getAllCategories();
            
            let filtered = state.businesses;
            if (state.selectedCategory !== 'All') {
                filtered = filtered.filter(b => b.category === state.selectedCategory);
            }
            if (state.searchQuery.trim() !== '') {
                const q = state.searchQuery.toLowerCase();
                filtered = filtered.filter(b => 
                    (b.name || '').toLowerCase().includes(q) || 
                    (b.description || '').toLowerCase().includes(q) ||
                    (b.address || '').toLowerCase().includes(q)
                );
            }

            filtered = filtered.sort((a, b) => {
                const rankA = a.rank || 0; const rankB = b.rank || 0;
                
                if(state.sortBy === 'rank') {
                    if(rankA !== rankB) return rankB - rankA;
                    if(a.isFeatured !== b.isFeatured) return b.isFeatured ? 1 : -1;
                    return (b.createdAt || 0) - (a.createdAt || 0);
                }

                if(a.isFeatured !== b.isFeatured) return b.isFeatured ? 1 : -1;
                
                if (state.sortBy === 'newest') return (b.createdAt || 0) - (a.createdAt || 0);
                if (state.sortBy === 'oldest') return (a.createdAt || 0) - (b.createdAt || 0);
                if (state.sortBy === 'nameAsc') return (a.name || '').localeCompare(b.name || '');
                return 0;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 fade-in text-center bg-slate-900/20 rounded-3xl border border-amber-500/10">
                        <i class="ph-fill ph-magnifying-glass text-5xl text-amber-500/50 mb-4"></i>
                        <h3 class="text-lg text-slate-300 font-bihari">${getTranslation('emptyState')}</h3>
                        <button onclick="navigate('add-business')" class="mt-4 text-amber-500 font-bold hover:text-amber-400">Be the first to list here!</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map((b, index) => {
                const catObj = allCats.find(c => c.id === b.category);
                const catName = getCategoryName(catObj);
                const catIcon = catObj ? catObj.icon : 'ph-storefront';

                let dynamicDetailsHtml = '';
                if (b.dynamicData) {
                    dynamicDetailsHtml = Object.entries(b.dynamicData).slice(0, 2).map(([key, val]) => 
                        `<div class="text-xs bg-slate-800/80 px-3 py-2 rounded-lg border border-white/5 text-slate-300 flex justify-between items-center"><span class="font-medium text-amber-100/50 truncate max-w-[50%] mr-2">${key}</span> <span class="text-white font-medium text-right truncate">${val}</span></div>`
                    ).join('');
                }

                const safeName = b.name || 'Unnamed Business';
                const safeOwner = b.owner || 'Owner';
                const safeDesc = b.description || 'No description available.';
                const safeAddress = b.address || 'Address not listed';

                const whatsappMsg = encodeURIComponent(`Pranam, I found "${safeName}" on Patna Suvidha. I would like to know more.`);
                const whatsappLink = `https://wa.me/91${b.phone}?text=${whatsappMsg}`;

                return `
                    <div onclick="viewBusiness('${b.id}')" class="glass-panel rounded-2xl overflow-hidden hover:shadow-[0_8px_30px_rgba(245,158,11,0.15)] hover:-translate-y-1.5 transition-all duration-300 flex flex-col h-full group fade-in-up border hover:border-amber-500/50 relative cursor-pointer ${b.isFeatured ? 'border-amber-500/40 shadow-[0_0_20px_rgba(245,158,11,0.15)]' : 'border-white/5'}" style="animation-delay: ${index * 0.05}s;">
                        
                        ${b.isFeatured ? `
                            <div class="absolute top-0 right-0 w-20 h-20 overflow-hidden z-20 pointer-events-none">
                                <div class="absolute transform rotate-45 bg-gradient-to-r from-amber-400 to-orange-500 text-white text-[9px] font-bold py-1 right-[-35px] top-[15px] w-[120px] text-center shadow-md tracking-widest">
                                    <i class="ph-fill ph-star mr-0.5"></i> FEATURED
                                </div>
                            </div>
                        ` : ''}

                        ${b.image ? `
                        <div class="w-full h-48 bg-slate-800/50 relative overflow-hidden border-b border-white/5">
                            <img src="${b.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="${safeName}">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] to-transparent opacity-80"></div>
                        </div>` : ''}

                        <div class="p-6 relative flex-grow ${b.image ? 'pt-4' : ''}">
                            <div class="inline-flex items-center bg-amber-500/10 border border-amber-500/20 text-amber-500 text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-md mb-4">
                                <i class="ph-fill ${catIcon} mr-1.5 text-sm"></i> ${catName}
                            </div>
                            
                            <h3 class="text-xl font-bihari font-bold text-white mb-1.5 pr-8 leading-tight group-hover:text-amber-400 transition-colors">${safeName}</h3>
                            <p class="text-sm text-slate-400 mb-4 flex items-center font-medium"><i class="ph-fill ph-user-circle text-lg mr-1.5 text-amber-500/70"></i> ${safeOwner}</p>
                            
                            <p class="text-slate-300 text-sm mb-5 line-clamp-2 leading-relaxed">${safeDesc}</p>
                            
                            <div class="mb-5 grid grid-cols-1 gap-1.5">
                                ${dynamicDetailsHtml}
                            </div>
                            
                            <div class="text-xs text-slate-400 flex flex-col gap-2 mt-auto border-t border-white/5 pt-4">
                                <div class="flex items-start">
                                    <i class="ph-fill ph-map-pin mt-0.5 mr-2 text-amber-500 flex-shrink-0 text-base"></i>
                                    <span class="line-clamp-1 leading-tight">${safeAddress}</span>
                                </div>
                                <div class="flex justify-between items-center mt-1 text-slate-500">
                                    <span class="flex items-center"><i class="ph-fill ph-clock mr-1 text-amber-500/50"></i> ${timeAgo(b.createdAt)}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-4 bg-slate-900/60 border-t border-white/5 flex gap-2 relative z-20">
                            <a href="${whatsappLink}" target="_blank" onclick="trackClick('${b.id}', 'whatsapp'); event.stopPropagation();" class="flex-1 bg-[#25D366]/10 hover:bg-[#25D366] text-[#25D366] hover:text-white border border-[#25D366]/30 font-bold py-2.5 px-2 rounded-xl transition-all duration-300 flex justify-center items-center text-sm shadow-sm group/wa">
                                <i class="ph-fill ph-whatsapp-logo text-xl mr-1.5 group-hover/wa:scale-110 transition-transform"></i> 
                                ${getTranslation('btnContact')}
                            </a>
                            <a href="tel:${b.phone}" onclick="trackClick('${b.id}', 'call'); event.stopPropagation();" class="flex-1 bg-white/5 hover:bg-amber-500/20 text-white border border-white/10 font-bold py-2.5 px-2 rounded-xl transition-all duration-300 flex justify-center items-center text-sm shadow-sm">
                                <i class="ph-fill ph-phone-call text-xl mr-1.5 text-amber-400"></i> 
                                ${getTranslation('btnCall')}
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Boot
        initAuthAndData(); 

    </script>
</body>
</html>
